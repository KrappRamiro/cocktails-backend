name = "cocktail-worker"
main = "build/worker/shim.mjs"
compatibility_date = "2024-01-01"

[build]
command = "cargo install -q worker-build && worker-build --release"

[[d1_databases]]
binding = "DB"
database_name = "cocktail-db"
database_id = "REEMPLAZAR_CON_OUTPUT_DE_OPENTOFU"

[vars]
EVENT_NAME = "Cumpleaños"
# En producción, ADMIN_USER y ADMIN_PASSWORD se crean como secrets vía OpenTofu.
# Para desarrollo local, se definen aquí directamente (solo aplica a `wrangler dev`).
ADMIN_USER = "organizador"
ADMIN_PASSWORD = "test123"
